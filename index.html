<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Analyse Maurice - Version Simplifiée</title>
  <style>
    body { background:#0b1220; color:#e7eefc; font-family:sans-serif; padding:20px; }
    .card { background:#0f1b33; border:1px solid #233357; border-radius:12px; padding:15px; margin-bottom:15px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:10px; }
    input { background:#0b1730; color:white; border:1px solid #233357; padding:8px; border-radius:5px; width:100%; }
    button { cursor:pointer; padding:10px; border-radius:8px; border:none; font-weight:bold; margin:5px 0; }
    .btn-api { background:#089981; color:white; }
    .btn-save { background:#1a3a6b; color:white; }
    pre { background:#0b1730; padding:10px; border-radius:8px; color:#19c37d; white-space:pre-wrap; }
  </style>
</head>
<body>

  <div class="card">
    <div style="display:flex; justify-content:space-between;">
      <h2>1) Actions & API</h2>
      <button id="genAll" style="background:#f59e0b">Générer Rapport Final</button>
    </div>
    <input id="tickersInput" value="NVDA, AAPL, MSFT" style="margin-bottom:10px;">
    <select id="tickerSelect" style="padding:10px; background:#0b1730; color:white; border-radius:8px;"></select>
    <button id="autoFillBtn" class="btn-api">✨ RÉCUPÉRER LES DONNÉES (VERCEL)</button>
  </div>

  <div class="card">
    <h2>2) Ratios Fondamentaux</h2>
    <div class="grid">
      <div><label>Secteur</label><input id="sector"></div>
      <div><label>P/E</label><input id="pe"></div>
      <div><label>PEG</label><input id="peg"></div>
      <div><label>ROE (%)</label><input id="roe5y"></div>
      <div><label>Marge nette</label><input id="netMargin"></div>
      <div><label>FCF Yield</label><input id="fcfYield"></div>
      <div><label>Dette/Équité</label><input id="de"></div>
    </div>
    <button id="saveActive" class="btn-save" style="margin-top:15px;">💾 ENREGISTRER CE TICKER</button>
  </div>

  <div class="card">
    <h2>3) Rapport Markdown</h2>
    <pre id="md">En attente de génération...</pre>
  </div>

<script>
const LS_KEY = "ma_bourse_data";

// 1. GESTION DE LA LISTE
document.getElementById("tickersInput").onchange = function() {
  const list = this.value.split(',').map(s => s.trim().toUpperCase());
  const sel = document.getElementById("tickerSelect");
  sel.innerHTML = "";
  list.forEach(s => { let opt = new Option(s,s); sel.add(opt); });
};
document.getElementById("tickersInput").onchange();

// 2. APPEL API VERS VERCEL
document.getElementById("autoFillBtn").onclick = async () => {
  const sym = document.getElementById("tickerSelect").value;
  document.getElementById("autoFillBtn").innerText = "⏳ Connexion...";
  
  try {
    const resp = await fetch(`/api/get-fundamentals?ticker=${sym}`);
    const data = await resp.json();
    const r = data.ratios;
    
    document.getElementById("sector").value = data.profile?.sector || "N/A";
    document.getElementById("pe").value = r.peRatioTTM?.toFixed(2) || "N/A";
    document.getElementById("peg").value = r.pegRatioTTM?.toFixed(2) || "N/A";
    document.getElementById("roe5y").value = r.returnOnEquityTTM ? (r.returnOnEquityTTM * 100).toFixed(1) + "%" : "N/A";
    document.getElementById("netMargin").value = r.netProfitMarginTTM ? (r.netProfitMarginTTM * 100).toFixed(1) + "%" : "N/A";
    document.getElementById("fcfYield").value = r.freeCashFlowYieldTTM ? (r.freeCashFlowYieldTTM * 100).toFixed(1) + "%" : "N/A";
    document.getElementById("de").value = r.debtToEquityTTM?.toFixed(2) || "N/A";
    
    alert("Données reçues pour " + sym);
  } catch (e) {
    alert("Erreur de connexion au moteur Vercel.");
  }
  document.getElementById("autoFillBtn").innerText = "✨ RÉCUPÉRER LES DONNÉES (VERCEL)";
};

// 3. SAUVEGARDE ET GÉNÉRATION
document.getElementById("saveActive").onclick = () => {
  const sym = document.getElementById("tickerSelect").value;
  const db = JSON.parse(localStorage.getItem(LS_KEY) || "{}");
  db[sym] = {
    sector: document.getElementById("sector").value,
    pe: document.getElementById("pe").value,
    roe: document.getElementById("roe5y").value,
    margin: document.getElementById("netMargin").value
  };
  localStorage.setItem(LS_KEY, JSON.stringify(db));
  alert(sym + " mémorisé !");
};

document.getElementById("genAll").onclick = () => {
  const db = JSON.parse(localStorage.getItem(LS_KEY) || "{}");
  let res = "| Ticker | Secteur | P/E | ROE | Marge |\n|---|---|---|---|---|\n";
  for(let s in db) {
    res += `| **${s}** | ${db[s].sector} | ${db[s].pe} | ${db[s].roe} | ${db[s].margin} |\n`;
  }
  document.getElementById("md").innerText = res;
};
</script>
</body>
</html>
