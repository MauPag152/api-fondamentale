<script>
async function fetchData() {
    const ticker = document.getElementById('tickerInput').value.trim();
    if (!ticker) return alert("Entrez un symbole");

    try {
        const response = await fetch(`/api/get-fundamentals?ticker=${ticker}`);
        const data = await response.json();
        const r = data.ratios || {};
        const p = data.profile || {};

        // Mapping des données vers vos cases de l'image e69cde.png
        document.getElementById('secteur').innerText = p.sector || "N/A";
        document.getElementById('pe').innerText = r.peRatioTTM ? r.peRatioTTM.toFixed(2) : "N/A";
        document.getElementById('peg').innerText = r.pegRatioTTM ? r.pegRatioTTM.toFixed(2) : "N/A";
        document.getElementById('roe5').innerText = r.returnOnEquityTTM ? (r.returnOnEquityTTM * 100).toFixed(2) + "%" : "N/A";
        document.getElementById('quickRatio').innerText = r.quickRatioTTM ? r.quickRatioTTM.toFixed(2) : "N/A";
        document.getElementById('detteEquite').innerText = r.debtToEquityTTM ? r.debtToEquityTTM.toFixed(2) : "N/A";
        document.getElementById('margeNette').innerText = r.netProfitMarginTTM ? (r.netProfitMarginTTM * 100).toFixed(2) + "%" : "N/A";
        document.getElementById('evEbitda').innerText = r.enterpriseValueOverEBITDATTM ? r.enterpriseValueOverEBITDATTM.toFixed(2) : "N/A";
        document.getElementById('couvertureInterets').innerText = r.interestCoverageTTM ? r.interestCoverageTTM.toFixed(2) : "N/A";
        document.getElementById('croissanceCA').innerText = r.revenueGrowthTTM ? (r.revenueGrowthTTM * 100).toFixed(2) + "%" : "N/A";

    } catch (error) {
        console.error("Erreur:", error);
    }
}
</script>
