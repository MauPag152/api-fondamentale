<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Analyse Bourse Maurice - Standard</title>
  <style>
    body { background:#0b1220; color:#e7eefc; font-family:sans-serif; padding:20px; }
    .card { background:#0f1b33; border:1px solid #233357; border-radius:12px; padding:15px; margin-bottom:15px; }
    input, select { background:#0b1730; color:white; border:1px solid #233357; padding:10px; border-radius:8px; width:100%; margin-bottom:10px; }
    button { cursor:pointer; padding:12px; border-radius:8px; border:none; font-weight:bold; width:100%; margin-top:5px; }
    .btn-api { background:#089981; color:white; }
    .btn-save { background:#1a3a6b; color:white; }
    .grid { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
    pre { background:#0b1730; padding:15px; border-radius:8px; color:#19c37d; border:1px solid #233357; }
  </style>
</head>
<body>

  <div class="card">
    <h2>1) Configuration & Ticker</h2>
    <label>MA CLÉ API FMP (Collez-la ici) :</label>
    <input id="apiKey" type="password" placeholder="Collez votre clé ici">
    
    <label>Action à analyser :</label>
    <select id="tickerSelect">
      <option value="NVDA">NVDA</option>
      <option value="AAPL">AAPL</option>
      <option value="MSFT">MSFT</option>
      <option value="GOOG">GOOG</option>
      <option value="AMZN">AMZN</option>
    </select>
    <button id="btnGo" class="btn-api">🚀 RÉCUPÉRER LES DONNÉES EN DIRECT</button>
  </div>

  <div class="card">
    <h2>2) Résultats de l'Analyse</h2>
    <div class="grid">
      <div><label>P/E</label><input id="pe" readonly></div>
      <div><label>ROE (%)</label><input id="roe" readonly></div>
      <div><label>Marge (%)</label><input id="margin" readonly></div>
      <div><label>FCF Yield</label><input id="fcf" readonly></div>
    </div>
    <button id="save" class="btn-save">💾 ENREGISTRER POUR LE RAPPORT</button>
  </div>

  <div class="card">
    <h2>3) Rapport Markdown Final</h2>
    <button id="gen" style="background:#f59e0b; color:white; margin-bottom:10px;">GÉNÉRER LE TABLEAU</button>
    <pre id="md">En attente...</pre>
  </div>

<script>
  const LS_KEY = "maurice_stock_data";

  document.getElementById("btnGo").onclick = async () => {
    const key = document.getElementById("apiKey").value;
    const sym = document.getElementById("tickerSelect").value;
    
    if(!key) return alert("Veuillez coller votre clé API en haut.");
    document.getElementById("btnGo").innerText = "⏳ Recherche...";

    try {
      // Appel direct à FMP sans passer par Vercel
      const url = `https://financialmodelingprep.com/api/v3/ratios-ttm/${sym}?apikey=${key}`;
      const response = await fetch(url);
      const data = await response.json();

      if (data && data.length > 0) {
        const r = data[0];
        document.getElementById("pe").value = r.peRatioTTM?.toFixed(2) || "N/A";
        document.getElementById("roe").value = (r.returnOnEquityTTM * 100).toFixed(1) + "%";
        document.getElementById("margin").value = (r.netProfitMarginTTM * 100).toFixed(1) + "%";
        document.getElementById("fcf").value = (r.freeCashFlowYieldTTM * 100).toFixed(1) + "%";
        alert("Succès ! Données trouvées pour " + sym);
      } else {
        alert("Clé invalide ou limite atteinte pour ce ticker.");
      }
    } catch (e) {
      alert("Erreur de connexion. Vérifiez votre internet ou la clé.");
    }
    document.getElementById("btnGo").innerText = "🚀 RÉCUPÉRER LES DONNÉES EN DIRECT";
  };

  document.getElementById("save").onclick = () => {
    const sym = document.getElementById("tickerSelect").value;
    const db = JSON.parse(localStorage.getItem(LS_KEY) || "{}");
    db[sym] = {
      pe: document.getElementById("pe").value,
      roe: document.getElementById("roe").value,
      margin: document.getElementById("margin").value
    };
    localStorage.setItem(LS_KEY, JSON.stringify(db));
    alert(sym + " mémorisé !");
  };

  document.getElementById("gen").onclick = () => {
    const db = JSON.parse(localStorage.getItem(LS_KEY) || "{}");
    let md = "| Ticker | P/E | ROE | Marge |\n|---|---|---|---|\n";
    for(let s in db) md += `| **${s}** | ${db[s].pe} | ${db[s].roe} | ${db[s].margin} |\n`;
    document.getElementById("md").innerText = md;
  };
</script>
</body>
</html>
